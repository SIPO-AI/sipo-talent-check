<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SIPO 人才测评系统 V3.80</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sipo-blue: #2c3e50; --sipo-accent: #c0392b; --bg: #f4f7f6; --disabled: #bdc3c7; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .container { max-width: 650px; margin: 10px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        .header { text-align: center; border-bottom: 2px solid var(--sipo-blue); padding-bottom: 15px; margin-bottom: 25px; position: relative; }
        .header h1 { font-size: 20px; color: var(--sipo-blue); margin: 0; }
        #timerBox { position: absolute; right: 0; top: 0; color: var(--sipo-accent); font-weight: bold; font-family: monospace; font-size: 14px; }
        .step { display: none; } .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .option-card { border: 1.5px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .option-card:hover { border-color: var(--sipo-blue); background: #f0f7ff; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; -webkit-appearance: none; }
        .btn-primary { width: 100%; background: var(--sipo-blue); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-primary:disabled { background: var(--disabled); cursor: not-allowed; }
        .progress-container { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: var(--sipo-blue); width: 0%; transition: 0.4s; }
        .result-line { margin: 12px 0; font-size: 15px; line-height: 1.6; color: #333; }
        .highlight { color: var(--sipo-accent); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>SIPO 人才测评系统</h1>
        <div id="timerBox" style="display:none;">用时 00:00</div>
    </div>
    
    <div id="step1" class="step active">
        <p style="color:#666; font-size:14px;">欢迎参加 SIPO 2026 战略人才测评。请确保填写准确，以便系统精准投放分析报告。</p>
        <input type="text" id="empName" placeholder="您的姓名 (必填)" oninput="checkForm()">
        <input type="email" id="empEmail" placeholder="电子邮箱 (请填写真实邮箱，勿浪费AI算力)" oninput="checkForm()">
        <select id="empJob" onchange="checkForm()">
            <option value="">请选择岗位职能 (必填)</option>
            <option value="总经理">总经理</option>
            <option value="国际贸易业务总监">国际贸易业务总监</option>
            <option value="生产供应链总监">生产供应链总监</option>
            <option value="国际贸易业务员">国际贸易业务员</option>
            <option value="生产跟单">生产跟单</option>
            <option value="业务跟单">业务跟单</option>
            <option value="运营助理">运营助理</option>
        </select>
        <button id="startBtn" class="btn-primary" onclick="startQuiz()" disabled>开始测评</button>
    </div>

    <div id="step2" class="step">
        <div class="progress-container"><div id="progressBar" class="progress-fill"></div></div>
        <h3 id="qTitle" style="font-size:16px; color:var(--sipo-blue);"></h3>
        <div id="optionsList"></div>
    </div>

    <div id="step3" class="step" style="text-align: center;">
        <div id="finalText" style="text-align:left;"></div>
        <canvas id="resultChart" style="margin: 20px 0; max-height: 250px;"></canvas>
        <button class="btn-primary" onclick="location.reload()" style="background:#95a5a6;">重新测评</button>
    </div>
</div>

        { id: 32, opts: [{t:'P', w:'行动缓慢 - 做事磨蹭'}, {t:'M', w:'容易怀疑 - 总在寻找背后的动机'}, {t:'C', w:'比较顽固 - 认准了就不回头'}, {t:'S', w:'喜欢表现 - 必须成为注意力的中心'}] },

        { id: 39, opts: [{t:'P', w:'漠不关心 - 对任何事都无所谓'}, {t:'C', w:'莽撞 - 行动先于思考'}, {t:'M', w:'消极 - 充满负能量'}, {t:'S', w:'天真 - 容易被骗'}] },
        { id: 40, opts: [{t:'P', w:'容易妥协 - 没有主见'}, {t:'M', w:'喜欢批评 - 看什么都不顺眼'}, {t:'C', w:'太狡猾 - 为达目的不择手段'}, {t:'S', w:'擅变化 - 承诺难以兑现'}] }
    ];

    let questions = [];
    let currentIdx = 0;
    let scoresP1 = {S:0, M:0, C:0, P:0};
    let scoresP2 = {S:0, M:0, C:0, P:0};
    let details = [];
    let startTime, timerInterval;

    function checkForm() {
        const name = document.getElementById('empName').value.trim();
        const email = document.getElementById('empEmail').value.trim();
        const job = document.getElementById('empJob').value;
        const btn = document.getElementById('startBtn');
        const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // 仅做基础格式判断
        
        if (name && emailReg.test(email) && job) {
            btn.disabled = false;
        } else {
            btn.disabled = true;
        }
    }

    function startQuiz() {
        window.user = { 
            name: document.getElementById('empName').value.trim(), 
            email: document.getElementById('empEmail').value.trim(), 
            job: document.getElementById('empJob').value 
        };
        let p1 = shuffle([...rawData.slice(0, 20)]);
        let p2 = shuffle([...rawData.slice(20, 40)]);
        questions = p1.concat(p2);
        
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        
        startTime = new Date();
        document.getElementById('timerBox').style.display = 'block';
        timerInterval = setInterval(() => {
            let diff = Math.floor((new Date() - startTime) / 1000);
            let m = String(Math.floor(diff/60)).padStart(2,'0');
            let s = String(diff%60).padStart(2,'0');
            document.getElementById('timerBox').innerText = "用时 " + m + ":" + s;
        }, 1000);
        
        showQ();
    }

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function showQ() {
        const q = questions[currentIdx];
        document.getElementById('qTitle').innerText = "第 " + (currentIdx + 1) + " / 40 题 " + (currentIdx < 20 ? '(特质篇)' : '(压力篇)');
        const list = document.getElementById('optionsList');
        list.innerHTML = '';
        shuffle([...q.opts]).forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option-card';
            div.innerText = opt.w;
            div.onclick = () => {
                if(currentIdx < 20) scoresP1[opt.t]++; else scoresP2[opt.t]++;
                details.push({ id: q.id, type: opt.t, text: opt.w });
                currentIdx++;
                if(currentIdx < 40) showQ(); else finish();
            };
            list.appendChild(div);
        });
        document.getElementById('progressBar').style.width = (currentIdx / 40 * 100) + '%';
    }

    function finish() {
        clearInterval(timerInterval);
        const durationText = document.getElementById('timerBox').innerText.replace("用时 ", "");
        const total = { S: scoresP1.S+scoresP2.S, M: scoresP1.M+scoresP2.M, C: scoresP1.C+scoresP2.C, P: scoresP1.P+scoresP2.P };
        const sorted = Object.entries(total).sort((a,b) => b[1]-a[1]);
        const typeNames = { 'S': '活跃', 'M': '完善', 'C': '能力', 'P': '平稳' };
        const mainType = typeNames[sorted[0][0]];
        const hiddenType = typeNames[sorted[1][0]];
        const combinedType = mainType + hiddenType + "型";
        const report = generateAnalysis(window.user.job, total, sorted[0][0]);

        document.getElementById('finalText').innerHTML = " \
            <div class='result-line'><strong>" + window.user.name + "，谢谢您！</strong><br>当前测评已完成，AI分析系统将依据您的测评进行深度分析</div> \
            <div class='result-line'>您的主导性格是：<span class='highlight'>" + mainType + "型</span> | 隐形性格是：<span class='highlight'>" + hiddenType + "型</span></div> \
            <div class='result-line'>得分详情：S:" + total.S + " | M:" + total.M + " | C:" + total.C + " | P:" + total.P + "</div> \
            <div class='result-line'>测评总耗时：<span class='highlight'>" + durationText + "</span></div> \
            <div class='result-line'>岗位适配度：<span class='highlight'>" + report.percent + "%</span></div> \
            <div class='result-line' style='color:var(--sipo-blue); font-weight:bold;'>请检查您测试所留邮箱，查收测试结果 (" + window.user.email + ")。</div> \
        ";
